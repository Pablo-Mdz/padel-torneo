<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Torneos 4Padel</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Permanent+Marker&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #101314;
    --panel: #171b1c;
    --panel-2: #1e2324;
    --border: #2a3032;
    --text: #e8e4dd;
    --muted: #8d938f;
    --accent: #d97f2e;
    --accent-dark: #b3651f;
    --green: #38d47a;
    --red: #ff5c5c;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: "Inter", system-ui, sans-serif;
    min-height: 100vh;
  }
  h1, h2, .oswald { font-family: "Oswald", "Arial Narrow", sans-serif; text-transform: uppercase; }

  .wrap { max-width: 1200px; margin: 0 auto; padding: 24px 20px 80px; }

  header.top { margin-bottom: 26px; }
  header.top h1 { font-size: 42px; font-weight: 700; letter-spacing: 2px; line-height: 1; color: #d9d5cd; }
  header.top h1 span { color: var(--accent); }
  header.top .sub {
    color: var(--accent); font-family: "Oswald", sans-serif; font-size: 15px;
    letter-spacing: 5px; text-transform: uppercase; margin-top: 8px;
  }
  header.top .sub .sep { color: var(--muted); margin: 0 6px; }

  /* Tabs */
  .tabs {
    display: grid; grid-template-columns: repeat(3, 1fr);
    background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
    overflow: hidden; margin-bottom: 30px;
  }
  .tab {
    appearance: none; border: 0; background: transparent; color: var(--muted);
    font-family: "Oswald", sans-serif; font-size: 16px; font-weight: 600;
    letter-spacing: 2px; text-transform: uppercase; padding: 16px 10px;
    cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
    transition: color .15s;
  }
  .tab:hover { color: var(--text); }
  .tab.active { background: var(--accent); color: #111; border-radius: 8px; }
  .tab svg { width: 18px; height: 18px; }

  /* Rounds */
  .ronda-title {
    font-family: "Oswald", sans-serif; font-size: 26px; font-weight: 700;
    letter-spacing: 1px; text-transform: uppercase;
    display: flex; align-items: center; gap: 14px; margin: 34px 0 16px;
  }
  .ronda-title:first-child { margin-top: 0; }
  .ronda-title b { color: var(--accent); }
  .ronda-title::after { content: ""; flex: 1; height: 1px; background: var(--border); }
  .descansa {
    color: var(--muted); font-family: "Oswald", sans-serif; font-size: 13px;
    letter-spacing: 2px; text-transform: uppercase; margin: -8px 0 14px;
  }
  .descansa b { color: var(--text); font-weight: 600; }

  .matches { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 18px; }

  .match {
    background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
    padding: 18px 20px;
  }
  .match .head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .match .cancha { color: var(--muted); font-size: 11px; letter-spacing: 4px; text-transform: uppercase; }
  .match .cancha-num { font-family: "Oswald", sans-serif; font-size: 28px; font-weight: 700; color: var(--accent); line-height: 1; }

  .team-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 8px 0; }
  .team-row .name {
    font-family: "Oswald", sans-serif; font-size: 17px; font-weight: 600;
    letter-spacing: 1.5px; text-transform: uppercase;
  }
  .team-row.winner .name { color: var(--accent); }
  .vs {
    display: flex; align-items: center; gap: 14px; color: var(--muted);
    font-family: "Oswald", sans-serif; font-size: 12px; letter-spacing: 2px; margin: 4px 0;
  }
  .vs::before, .vs::after { content: ""; flex: 1; height: 1px; background: var(--border); }

  .score {
    width: 64px; height: 42px; background: var(--panel-2); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-family: "Oswald", sans-serif;
    font-size: 20px; font-weight: 600; text-align: center; outline: none;
    transition: border-color .15s;
  }
  .score::placeholder { color: #55555c; }
  .score:focus { border-color: var(--accent); }
  .score::-webkit-outer-spin-button, .score::-webkit-inner-spin-button { -webkit-appearance: none; }
  .score[type=number] { -moz-appearance: textfield; appearance: textfield; }

  /* Tabla */
  .tabla-card { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  thead th {
    font-family: "Oswald", sans-serif; font-size: 13px; font-weight: 600; letter-spacing: 2px;
    text-transform: uppercase; color: var(--muted); text-align: center;
    padding: 16px 12px; border-bottom: 1px solid var(--border);
  }
  thead th.left, td.left { text-align: left; }
  tbody td { padding: 15px 12px; text-align: center; border-bottom: 1px solid var(--border); font-size: 15px; }
  tbody tr:last-child td { border-bottom: 0; }
  tbody tr:hover { background: rgba(217, 127, 46, 0.05); }
  td.pos { font-family: "Oswald", sans-serif; font-weight: 700; color: var(--accent); width: 56px; }
  td.equipo { font-family: "Oswald", sans-serif; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; font-size: 16px; }
  td .players { display: block; font-family: "Inter", sans-serif; font-size: 12px; color: var(--muted); text-transform: none; letter-spacing: 0; font-weight: 400; margin-top: 3px; }
  td.pts { font-family: "Oswald", sans-serif; font-weight: 700; font-size: 18px; color: var(--accent); }
  td.diff-pos { color: var(--green); }
  td.diff-neg { color: var(--red); }
  tr.top1 td.pos::after { content: " 🏆"; font-size: 12px; }

  .leyenda {
    display: flex; flex-wrap: wrap; gap: 8px 22px; margin-top: 16px;
    color: var(--muted); font-size: 13px;
  }
  .leyenda b {
    font-family: "Oswald", sans-serif; font-weight: 600; letter-spacing: 1px;
    text-transform: uppercase; color: var(--accent); margin-right: 5px;
  }
  .hint { color: var(--muted); font-size: 13px; margin-top: 10px; }

  /* Equipos */
  .equipos-actions { display: flex; justify-content: flex-end; margin-bottom: 18px; }
  .btn-add {
    appearance: none; background: var(--accent); border: 0; border-radius: 8px;
    color: #111; font-family: "Oswald", sans-serif; font-size: 14px; font-weight: 600;
    letter-spacing: 2px; text-transform: uppercase; padding: 12px 20px; cursor: pointer;
    transition: background .15s;
  }
  .btn-add:hover { background: var(--accent-dark); }

  .equipos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 18px; }
  .equipo-card { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
  .equipo-card .card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .equipo-card .num {
    font-family: "Oswald", sans-serif; font-size: 13px; font-weight: 600;
    letter-spacing: 3px; color: var(--accent); text-transform: uppercase;
  }
  .btn-del {
    appearance: none; background: transparent; border: 1px solid var(--border); border-radius: 6px;
    color: var(--muted); font-size: 14px; line-height: 1; padding: 6px 9px; cursor: pointer;
    transition: all .15s;
  }
  .btn-del:hover { border-color: var(--red); color: var(--red); }
  .btn-del:disabled { opacity: .3; cursor: not-allowed; }
  .equipo-card label { display: block; color: var(--muted); font-size: 11px; letter-spacing: 2px; text-transform: uppercase; margin: 12px 0 5px; }
  .equipo-card input {
    width: 100%; background: var(--panel-2); border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); font-family: "Inter", sans-serif; font-size: 15px; padding: 10px 12px;
    outline: none; transition: border-color .15s;
  }
  .equipo-card input.team-name { font-family: "Oswald", sans-serif; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; }
  .equipo-card input:focus { border-color: var(--accent); }

  .actions { margin-top: 34px; display: flex; justify-content: flex-end; }
  .btn-reset {
    appearance: none; background: transparent; border: 1px solid var(--border); border-radius: 8px;
    color: var(--muted); font-family: "Oswald", sans-serif; font-size: 13px; letter-spacing: 2px;
    text-transform: uppercase; padding: 10px 18px; cursor: pointer; transition: all .15s;
  }
  .btn-reset:hover { border-color: var(--red); color: var(--red); }

  .view { display: none; }
  .view.active { display: block; }

  footer.sponsors {
    margin-top: 60px; padding-top: 20px; border-top: 1px solid var(--border);
    display: flex; justify-content: center; align-items: center; gap: 18px;
    color: var(--muted); font-family: "Oswald", sans-serif; font-size: 13px;
    letter-spacing: 4px; text-transform: uppercase; flex-wrap: wrap;
  }
  footer.sponsors .sep { color: var(--accent); }

  @media (max-width: 640px) {
    header.top h1 { font-size: 32px; }
    .tab { font-size: 13px; letter-spacing: 1px; padding: 13px 6px; }
    .tab svg { display: none; }
    thead th, tbody td { padding: 12px 6px; font-size: 13px; }
    td.equipo { font-size: 13px; }
  }
</style>
</head>
<body>
<div class="wrap">

  <header class="top">
    <h1>Torneos <span>4Padel</span></h1>
    <div class="sub" id="sub-line"></div>
  </header>

  <nav class="tabs">
    <button class="tab active" data-view="partidos">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Partidos
    </button>
    <button class="tab" data-view="tabla">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      Tabla
    </button>
    <button class="tab" data-view="equipos">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      Equipos
    </button>
  </nav>

  <section id="view-partidos" class="view active"></section>

  <section id="view-tabla" class="view">
    <div class="tabla-card">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th class="left">Equipo</th>
            <th title="Partidos jugados">PJ</th>
            <th title="Ganados">G</th>
            <th title="Perdidos">P</th>
            <th title="Diferencia de games">Diff</th>
            <th title="Puntos">Pts</th>
          </tr>
        </thead>
        <tbody id="tabla-body"></tbody>
      </table>
    </div>
    <div class="leyenda">
      <span><b>PJ</b> Partidos jugados</span>
      <span><b>G</b> Ganados</span>
      <span><b>P</b> Perdidos</span>
      <span><b>Diff</b> Diferencia de games (a favor − en contra)</span>
      <span><b>Pts</b> Puntos</span>
    </div>
    <p class="hint">Victoria = 2 pts · Empate = 1 pt · Desempate por Pts, luego Diff.</p>
  </section>

  <section id="view-equipos" class="view">
    <div class="equipos-actions">
      <button class="btn-add" id="btn-add">+ Agregar equipo</button>
    </div>
    <div class="equipos-grid" id="equipos-grid"></div>
    <div class="actions">
      <button class="btn-reset" id="btn-reset">Borrar todos los resultados</button>
    </div>
  </section>

  <footer class="sponsors">
    <span>4Padel Berlin</span>
  </footer>

</div>

<script>
const STORAGE_KEY = "padel-torneo-v2";
const LEGACY_KEY = "padel-torneo-v1";

const DEFAULT_TEAMS = [
  { id: 1, name: "MAS - RODON",          p1: "Martina Mas",             p2: "Jordi Rodon" },
  { id: 2, name: "NGUYEN - SIEVER",      p1: "Kien Quang Nguyen",       p2: "Daniel Siever" },
  { id: 3, name: "DELGADO - GUADAGNO",   p1: "Lautaro Delgado Curbelo", p2: "Riccardo Guadagno" },
  { id: 4, name: "ROSENSTIEHL - NGUY",   p1: "Simon Rosenstiehl",       p2: "Stephane Nguy" },
  { id: 5, name: "BORTOLOTTI - GARCIA",  p1: "Francesca Bortolotti",    p2: "Jonathan Garcia" },
  { id: 6, name: "RABINO - RODRIGUEZ",   p1: "Josefina Rabino",         p2: "Marc Rodriguez" },
];

// Fixture del formato v1 (6 equipos fijos), solo para migrar resultados viejos.
const LEGACY_ROUNDS = [
  [[0,5],[1,4],[2,3]],
  [[0,4],[5,3],[1,2]],
  [[0,3],[4,2],[5,1]],
  [[0,2],[3,1],[4,5]],
  [[0,1],[2,5],[3,4]],
];

let state = load();

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const s = JSON.parse(raw);
      if (Array.isArray(s.teams) && s.teams.length >= 2 && s.scores) return s;
    }
  } catch (e) {}
  try {
    const raw = localStorage.getItem(LEGACY_KEY);
    if (raw) {
      const old = JSON.parse(raw);
      if (old.teams?.length === 6 && old.scores) return migrateV1(old);
    }
  } catch (e) {}
  return freshState();
}

function migrateV1(old) {
  const teams = old.teams.map((t, i) => ({ id: i + 1, name: t.name, p1: t.p1, p2: t.p2 }));
  const scores = {};
  LEGACY_ROUNDS.forEach((round, r) => {
    round.forEach(([ta, tb], m) => {
      const sc = old.scores[r + "-" + m];
      if (!sc || (sc.a == null && sc.b == null)) return;
      scores[pairKey(teams[ta].id, teams[tb].id)] = { [teams[ta].id]: sc.a, [teams[tb].id]: sc.b };
    });
  });
  const migrated = { teams, scores };
  state = migrated;
  save();
  return migrated;
}

function freshState() {
  return {
    teams: DEFAULT_TEAMS.map(t => ({ ...t })),
    // scores[pairKey] = { [teamId]: puntos, [teamId]: puntos }
    scores: {},
  };
}

function save() {
  // localStorage puede estar bloqueado (visor embebido, modo privado):
  // el torneo sigue funcionando en memoria aunque no persista.
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch (e) {}
}

function pairKey(idA, idB) {
  return idA < idB ? idA + "_" + idB : idB + "_" + idA;
}

function getScore(idA, idB) {
  const sc = state.scores[pairKey(idA, idB)] || {};
  return { a: sc[idA] ?? null, b: sc[idB] ?? null };
}

function setScore(idA, idB, ownId, value) {
  const key = pairKey(idA, idB);
  const cur = state.scores[key] || {};
  if (value === "") delete cur[ownId];
  else cur[ownId] = Math.max(0, parseInt(value, 10) || 0);
  state.scores[key] = cur;
  save();
  renderTabla();
}

function nextTeamId() {
  return state.teams.reduce((m, t) => Math.max(m, t.id), 0) + 1;
}

// Round-robin (método del círculo) para n equipos.
// Si n es impar se agrega un "bye": cada ronda descansa un equipo.
// Devuelve rondas de pares de índices sobre state.teams.
function buildRounds(n) {
  const idx = [...Array(n).keys()];
  if (n % 2 === 1) idx.push(-1);
  const m = idx.length;
  const rot = idx.slice(1);
  const rounds = [];
  for (let r = 0; r < m - 1; r++) {
    const cur = [idx[0], ...rot];
    const pairs = [];
    let bye = null;
    for (let i = 0; i < m / 2; i++) {
      const a = cur[i], b = cur[m - 1 - i];
      if (a === -1) bye = b;
      else if (b === -1) bye = a;
      else pairs.push([a, b]);
    }
    rounds.push({ pairs, bye });
    rot.push(rot.shift());
  }
  return rounds;
}

/* ---------- Header ---------- */
function renderHeader() {
  const n = state.teams.length;
  const canchas = Math.floor(n / 2);
  document.getElementById("sub-line").innerHTML =
    `${n} equipos <span class="sep">·</span> ${canchas} cancha${canchas === 1 ? "" : "s"} <span class="sep">·</span> todos contra todos`;
}

/* ---------- Partidos ---------- */
function renderPartidos() {
  const root = document.getElementById("view-partidos");
  root.innerHTML = "";
  const rounds = buildRounds(state.teams.length);

  rounds.forEach((round, r) => {
    const title = document.createElement("h2");
    title.className = "ronda-title";
    title.innerHTML = `Ronda <b>${r + 1}</b>`;
    root.appendChild(title);

    if (round.bye != null) {
      const d = document.createElement("div");
      d.className = "descansa";
      d.innerHTML = `Descansa: <b>${esc(state.teams[round.bye].name)}</b>`;
      root.appendChild(d);
    }

    const grid = document.createElement("div");
    grid.className = "matches";

    round.pairs.forEach(([ta, tb], m) => {
      const A = state.teams[ta], B = state.teams[tb];
      const sc = getScore(A.id, B.id);
      const card = document.createElement("div");
      card.className = "match";
      card.innerHTML = `
        <div class="head">
          <span class="cancha">Cancha</span>
          <span class="cancha-num">${m + 1}</span>
        </div>
        <div class="team-row" data-side="a">
          <span class="name">${esc(A.name)}</span>
          <input class="score" type="number" min="0" inputmode="numeric" placeholder="-"
                 value="${sc.a ?? ""}" data-ia="${A.id}" data-ib="${B.id}" data-own="${A.id}" />
        </div>
        <div class="vs">vs</div>
        <div class="team-row" data-side="b">
          <span class="name">${esc(B.name)}</span>
          <input class="score" type="number" min="0" inputmode="numeric" placeholder="-"
                 value="${sc.b ?? ""}" data-ia="${A.id}" data-ib="${B.id}" data-own="${B.id}" />
        </div>
      `;
      grid.appendChild(card);
      updateWinnerHighlight(card, A.id, B.id);
    });
    root.appendChild(grid);
  });

  root.querySelectorAll("input.score").forEach(inp => {
    inp.addEventListener("input", e => {
      const { ia, ib, own } = e.target.dataset;
      setScore(+ia, +ib, +own, e.target.value);
      updateWinnerHighlight(e.target.closest(".match"), +ia, +ib);
    });
  });
}

function updateWinnerHighlight(card, idA, idB) {
  const sc = getScore(idA, idB);
  const rowA = card.querySelector('.team-row[data-side="a"]');
  const rowB = card.querySelector('.team-row[data-side="b"]');
  rowA.classList.remove("winner");
  rowB.classList.remove("winner");
  if (sc.a != null && sc.b != null && sc.a !== sc.b) {
    (sc.a > sc.b ? rowA : rowB).classList.add("winner");
  }
}

/* ---------- Tabla ---------- */
function computeStandings() {
  const rows = state.teams.map(t => ({
    id: t.id, name: t.name, p1: t.p1, p2: t.p2,
    pj: 0, g: 0, p: 0, e: 0, gf: 0, gc: 0, pts: 0,
  }));
  const byId = Object.fromEntries(rows.map(r => [r.id, r]));

  buildRounds(state.teams.length).forEach(round => {
    round.pairs.forEach(([ta, tb]) => {
      const A = byId[state.teams[ta].id], B = byId[state.teams[tb].id];
      const sc = getScore(A.id, B.id);
      if (sc.a == null || sc.b == null) return;
      A.pj++; B.pj++;
      A.gf += sc.a; A.gc += sc.b;
      B.gf += sc.b; B.gc += sc.a;
      if (sc.a > sc.b)      { A.g++; B.p++; A.pts += 2; }
      else if (sc.b > sc.a) { B.g++; A.p++; B.pts += 2; }
      else                  { A.e++; B.e++; A.pts++; B.pts++; }
    });
  });

  rows.sort((x, y) =>
    y.pts - x.pts ||
    (y.gf - y.gc) - (x.gf - x.gc) ||
    y.gf - x.gf ||
    x.name.localeCompare(y.name)
  );
  return rows;
}

function renderTabla() {
  const body = document.getElementById("tabla-body");
  const rows = computeStandings();
  const anyPlayed = rows.some(r => r.pj > 0);
  body.innerHTML = rows.map((row, i) => {
    const diff = row.gf - row.gc;
    const diffCls = diff > 0 ? "diff-pos" : diff < 0 ? "diff-neg" : "";
    const diffTxt = diff > 0 ? "+" + diff : diff;
    return `
      <tr class="${i === 0 && anyPlayed ? "top1" : ""}">
        <td class="pos">${i + 1}</td>
        <td class="equipo left">${esc(row.name)}<span class="players">${esc(row.p1)} · ${esc(row.p2)}</span></td>
        <td>${row.pj}</td>
        <td>${row.g}</td>
        <td>${row.p}</td>
        <td class="${diffCls}">${diffTxt}</td>
        <td class="pts">${row.pts}</td>
      </tr>`;
  }).join("");
}

/* ---------- Equipos ---------- */
function renderEquipos() {
  const grid = document.getElementById("equipos-grid");
  const canDelete = state.teams.length > 2;
  grid.innerHTML = state.teams.map((t, i) => `
    <div class="equipo-card">
      <div class="card-top">
        <span class="num">Equipo ${i + 1}</span>
        <button class="btn-del" data-id="${t.id}" title="Eliminar equipo" ${canDelete ? "" : "disabled"}>✕</button>
      </div>
      <label>Nombre del equipo</label>
      <input class="team-name" data-id="${t.id}" data-field="name" value="${esc(t.name)}" />
      <label>Jugador/a 1</label>
      <input data-id="${t.id}" data-field="p1" value="${esc(t.p1)}" />
      <label>Jugador/a 2</label>
      <input data-id="${t.id}" data-field="p2" value="${esc(t.p2)}" />
    </div>
  `).join("");

  grid.querySelectorAll("input").forEach(inp => {
    inp.addEventListener("input", e => {
      const { id, field } = e.target.dataset;
      const team = state.teams.find(t => t.id === +id);
      if (!team) return;
      team[field] = e.target.value;
      save();
      renderHeader();
      renderPartidos();
      renderTabla();
    });
  });

  grid.querySelectorAll(".btn-del").forEach(btn => {
    btn.addEventListener("click", () => {
      const id = +btn.dataset.id;
      const team = state.teams.find(t => t.id === id);
      if (!team) return;
      if (!confirm(`¿Eliminar "${team.name}"? Se borran sus resultados y el fixture se rearma.`)) return;
      state.teams = state.teams.filter(t => t.id !== id);
      for (const key of Object.keys(state.scores)) {
        const [a, b] = key.split("_").map(Number);
        if (a === id || b === id) delete state.scores[key];
      }
      save();
      renderAll();
    });
  });
}

document.getElementById("btn-add").addEventListener("click", () => {
  const id = nextTeamId();
  state.teams.push({ id, name: `EQUIPO ${state.teams.length + 1}`, p1: "", p2: "" });
  save();
  renderAll();
  const inputs = document.querySelectorAll(`#equipos-grid input[data-id="${id}"]`);
  if (inputs[0]) { inputs[0].focus(); inputs[0].select(); }
});

document.getElementById("btn-reset").addEventListener("click", () => {
  if (confirm("¿Borrar todos los resultados? Los equipos se mantienen.")) {
    state.scores = {};
    save();
    renderAll();
  }
});

/* ---------- Tabs ---------- */
document.querySelectorAll(".tab").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach(b => b.classList.remove("active"));
    document.querySelectorAll(".view").forEach(v => v.classList.remove("active"));
    btn.classList.add("active");
    document.getElementById("view-" + btn.dataset.view).classList.add("active");
    if (btn.dataset.view === "tabla") renderTabla();
  });
});

function esc(s) {
  return String(s).replace(/[&<>"']/g, c =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

function renderAll() {
  renderHeader();
  renderPartidos();
  renderTabla();
  renderEquipos();
}

renderAll();
</script>
</body>
</html>
