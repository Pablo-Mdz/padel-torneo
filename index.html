<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Padel Fiesta · Día del Amigo</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Permanent+Marker&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #101314;
    --panel: #171b1c;
    --panel-2: #1e2324;
    --border: #2a3032;
    --text: #e8e4dd;
    --muted: #8d938f;
    --accent: #d97f2e;
    --accent-dark: #b3651f;
    --green: #38d47a;
    --red: #ff5c5c;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: "Inter", system-ui, sans-serif;
    min-height: 100vh;
  }
  h1, h2, .oswald { font-family: "Oswald", "Arial Narrow", sans-serif; text-transform: uppercase; }

  .wrap { max-width: 1200px; margin: 0 auto; padding: 24px 20px 80px; }

  header.top { margin-bottom: 26px; }
  header.top .amigo {
    font-family: "Permanent Marker", cursive; color: var(--text);
    font-size: 19px; letter-spacing: 3px; text-transform: uppercase;
    display: inline-block; transform: rotate(-3deg); margin-bottom: 4px;
  }
  header.top h1 { font-size: 42px; font-weight: 700; letter-spacing: 2px; line-height: 1; color: #d9d5cd; }
  header.top .sub {
    color: var(--accent); font-family: "Oswald", sans-serif; font-size: 15px;
    letter-spacing: 5px; text-transform: uppercase; margin-top: 8px;
  }
  header.top .sub .sep { color: var(--muted); margin: 0 6px; }

  /* Tabs */
  .tabs {
    display: grid; grid-template-columns: repeat(3, 1fr);
    background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
    overflow: hidden; margin-bottom: 30px;
  }
  .tab {
    appearance: none; border: 0; background: transparent; color: var(--muted);
    font-family: "Oswald", sans-serif; font-size: 16px; font-weight: 600;
    letter-spacing: 2px; text-transform: uppercase; padding: 16px 10px;
    cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
    transition: color .15s;
  }
  .tab:hover { color: var(--text); }
  .tab.active { background: var(--accent); color: #111; border-radius: 8px; }
  .tab svg { width: 18px; height: 18px; }

  /* Rounds */
  .ronda-title {
    font-family: "Oswald", sans-serif; font-size: 26px; font-weight: 700;
    letter-spacing: 1px; text-transform: uppercase;
    display: flex; align-items: center; gap: 14px; margin: 34px 0 16px;
  }
  .ronda-title:first-child { margin-top: 0; }
  .ronda-title b { color: var(--accent); }
  .ronda-title::after { content: ""; flex: 1; height: 1px; background: var(--border); }

  .matches { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 18px; }

  .match {
    background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
    padding: 18px 20px;
  }
  .match .head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .match .cancha { color: var(--muted); font-size: 11px; letter-spacing: 4px; text-transform: uppercase; }
  .match .cancha-num { font-family: "Oswald", sans-serif; font-size: 28px; font-weight: 700; color: var(--accent); line-height: 1; }

  .team-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 8px 0; }
  .team-row .name {
    font-family: "Oswald", sans-serif; font-size: 17px; font-weight: 600;
    letter-spacing: 1.5px; text-transform: uppercase;
  }
  .team-row.winner .name { color: var(--accent); }
  .vs {
    display: flex; align-items: center; gap: 14px; color: var(--muted);
    font-family: "Oswald", sans-serif; font-size: 12px; letter-spacing: 2px; margin: 4px 0;
  }
  .vs::before, .vs::after { content: ""; flex: 1; height: 1px; background: var(--border); }

  .score {
    width: 64px; height: 42px; background: var(--panel-2); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-family: "Oswald", sans-serif;
    font-size: 20px; font-weight: 600; text-align: center; outline: none;
    transition: border-color .15s;
  }
  .score::placeholder { color: #55555c; }
  .score:focus { border-color: var(--accent); }
  .score::-webkit-outer-spin-button, .score::-webkit-inner-spin-button { -webkit-appearance: none; }
  .score[type=number] { -moz-appearance: textfield; appearance: textfield; }

  /* Tabla */
  .tabla-card { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  thead th {
    font-family: "Oswald", sans-serif; font-size: 13px; font-weight: 600; letter-spacing: 2px;
    text-transform: uppercase; color: var(--muted); text-align: center;
    padding: 16px 12px; border-bottom: 1px solid var(--border);
  }
  thead th.left, td.left { text-align: left; }
  tbody td { padding: 15px 12px; text-align: center; border-bottom: 1px solid var(--border); font-size: 15px; }
  tbody tr:last-child td { border-bottom: 0; }
  tbody tr:hover { background: rgba(217, 127, 46, 0.05); }
  td.pos { font-family: "Oswald", sans-serif; font-weight: 700; color: var(--accent); width: 56px; }
  td.equipo { font-family: "Oswald", sans-serif; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; font-size: 16px; }
  td .players { display: block; font-family: "Inter", sans-serif; font-size: 12px; color: var(--muted); text-transform: none; letter-spacing: 0; font-weight: 400; margin-top: 3px; }
  td.pts { font-family: "Oswald", sans-serif; font-weight: 700; font-size: 18px; color: var(--accent); }
  td.diff-pos { color: var(--green); }
  td.diff-neg { color: var(--red); }
  tr.top1 td.pos::after { content: " 🏆"; font-size: 12px; }

  .leyenda {
    display: flex; flex-wrap: wrap; gap: 8px 22px; margin-top: 16px;
    color: var(--muted); font-size: 13px;
  }
  .leyenda b {
    font-family: "Oswald", sans-serif; font-weight: 600; letter-spacing: 1px;
    text-transform: uppercase; color: var(--accent); margin-right: 5px;
  }
  .hint { color: var(--muted); font-size: 13px; margin-top: 10px; }

  /* Equipos */
  .equipos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 18px; }
  .equipo-card { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
  .equipo-card .num {
    font-family: "Oswald", sans-serif; font-size: 13px; font-weight: 600;
    letter-spacing: 3px; color: var(--accent); text-transform: uppercase; margin-bottom: 12px;
  }
  .equipo-card label { display: block; color: var(--muted); font-size: 11px; letter-spacing: 2px; text-transform: uppercase; margin: 12px 0 5px; }
  .equipo-card input {
    width: 100%; background: var(--panel-2); border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); font-family: "Inter", sans-serif; font-size: 15px; padding: 10px 12px;
    outline: none; transition: border-color .15s;
  }
  .equipo-card input.team-name { font-family: "Oswald", sans-serif; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; }
  .equipo-card input:focus { border-color: var(--accent); }

  .actions { margin-top: 34px; display: flex; justify-content: flex-end; }
  .btn-reset {
    appearance: none; background: transparent; border: 1px solid var(--border); border-radius: 8px;
    color: var(--muted); font-family: "Oswald", sans-serif; font-size: 13px; letter-spacing: 2px;
    text-transform: uppercase; padding: 10px 18px; cursor: pointer; transition: all .15s;
  }
  .btn-reset:hover { border-color: var(--red); color: var(--red); }

  .view { display: none; }
  .view.active { display: block; }

  footer.sponsors {
    margin-top: 60px; padding-top: 20px; border-top: 1px solid var(--border);
    display: flex; justify-content: center; align-items: center; gap: 18px;
    color: var(--muted); font-family: "Oswald", sans-serif; font-size: 13px;
    letter-spacing: 4px; text-transform: uppercase; flex-wrap: wrap;
  }
  footer.sponsors .sep { color: var(--accent); }

  @media (max-width: 640px) {
    .tab { font-size: 13px; letter-spacing: 1px; padding: 13px 6px; }
    .tab svg { display: none; }
    thead th, tbody td { padding: 12px 6px; font-size: 13px; }
    td.equipo { font-size: 13px; }
  }
</style>
</head>
<body>
<div class="wrap">

  <header class="top">
    <div class="amigo">Día del Amigo</div>
    <h1>Padel Fiesta</h1>
    <div class="sub">Sat. 18.07 <span class="sep">|</span> 20 Uhr <span class="sep">·</span> 6 equipos <span class="sep">·</span> 3 canchas</div>
  </header>

  <nav class="tabs">
    <button class="tab active" data-view="partidos">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Partidos
    </button>
    <button class="tab" data-view="tabla">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      Tabla
    </button>
    <button class="tab" data-view="equipos">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      Equipos
    </button>
  </nav>

  <section id="view-partidos" class="view active"></section>

  <section id="view-tabla" class="view">
    <div class="tabla-card">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th class="left">Equipo</th>
            <th title="Partidos jugados">PJ</th>
            <th title="Ganados">G</th>
            <th title="Perdidos">P</th>
            <th title="Diferencia de games">Diff</th>
            <th title="Puntos">Pts</th>
          </tr>
        </thead>
        <tbody id="tabla-body"></tbody>
      </table>
    </div>
    <div class="leyenda">
      <span><b>PJ</b> Partidos jugados</span>
      <span><b>G</b> Ganados</span>
      <span><b>P</b> Perdidos</span>
      <span><b>Diff</b> Diferencia de games (a favor − en contra)</span>
      <span><b>Pts</b> Puntos</span>
    </div>
    <p class="hint">Victoria = 2 pts · Empate = 1 pt · Desempate por Pts, luego Diff.</p>
  </section>

  <section id="view-equipos" class="view">
    <div class="equipos-grid" id="equipos-grid"></div>
    <div class="actions">
      <button class="btn-reset" id="btn-reset">Reiniciar torneo</button>
    </div>
  </section>

  <footer class="sponsors">
    <span>4Padel</span><span class="sep">|</span><span>ATR Party</span><span class="sep">|</span><span>Fernet-Branca</span>
  </footer>

</div>

<script>
const STORAGE_KEY = "padel-torneo-v1";

const DEFAULT_TEAMS = [
  { name: "MAS - RODON",          p1: "Martina Mas",             p2: "Jordi Rodon" },
  { name: "NGUYEN - SIEVER",      p1: "Kien Quang Nguyen",       p2: "Daniel Siever" },
  { name: "DELGADO - GUADAGNO",   p1: "Lautaro Delgado Curbelo", p2: "Riccardo Guadagno" },
  { name: "ROSENSTIEHL - NGUY",   p1: "Simon Rosenstiehl",       p2: "Stephane Nguy" },
  { name: "BORTOLOTTI - GARCIA",  p1: "Francesca Bortolotti",    p2: "Jonathan Garcia" },
  { name: "RABINO - RODRIGUEZ",   p1: "Josefina Rabino",         p2: "Marc Rodriguez" },
];

// Round-robin (método del círculo) para 6 equipos: 5 rondas, 3 canchas.
const ROUNDS = [
  [[0,5],[1,4],[2,3]],
  [[0,4],[5,3],[1,2]],
  [[0,3],[4,2],[5,1]],
  [[0,2],[3,1],[4,5]],
  [[0,1],[2,5],[3,4]],
];

let state = load();

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const s = JSON.parse(raw);
      if (s.teams?.length === 6 && s.scores) return s;
    }
  } catch (e) {}
  return freshState();
}

function freshState() {
  return {
    teams: DEFAULT_TEAMS.map(t => ({ ...t })),
    // scores["r-m"] = { a: number|null, b: number|null }
    scores: {},
  };
}

function save() {
  // localStorage puede estar bloqueado (visor embebido, modo privado):
  // el torneo sigue funcionando en memoria aunque no persista.
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch (e) {}
}

function getScore(r, m) {
  return state.scores[r + "-" + m] || { a: null, b: null };
}

function setScore(r, m, side, value) {
  const key = r + "-" + m;
  const cur = state.scores[key] || { a: null, b: null };
  cur[side] = value === "" ? null : Math.max(0, parseInt(value, 10) || 0);
  state.scores[key] = cur;
  save();
  renderTabla();
  updateWinnerHighlight(r, m);
}

/* ---------- Partidos ---------- */
function renderPartidos() {
  const root = document.getElementById("view-partidos");
  root.innerHTML = "";
  ROUNDS.forEach((round, r) => {
    const title = document.createElement("h2");
    title.className = "ronda-title";
    title.innerHTML = `Ronda <b>${r + 1}</b>`;
    root.appendChild(title);

    const grid = document.createElement("div");
    grid.className = "matches";

    round.forEach(([ta, tb], m) => {
      const sc = getScore(r, m);
      const card = document.createElement("div");
      card.className = "match";
      card.id = `match-${r}-${m}`;
      card.innerHTML = `
        <div class="head">
          <span class="cancha">Cancha</span>
          <span class="cancha-num">${m + 1}</span>
        </div>
        <div class="team-row" data-side="a">
          <span class="name">${esc(state.teams[ta].name)}</span>
          <input class="score" type="number" min="0" inputmode="numeric" placeholder="-"
                 value="${sc.a ?? ""}" data-r="${r}" data-m="${m}" data-side="a" />
        </div>
        <div class="vs">vs</div>
        <div class="team-row" data-side="b">
          <span class="name">${esc(state.teams[tb].name)}</span>
          <input class="score" type="number" min="0" inputmode="numeric" placeholder="-"
                 value="${sc.b ?? ""}" data-r="${r}" data-m="${m}" data-side="b" />
        </div>
      `;
      grid.appendChild(card);
    });
    root.appendChild(grid);
  });

  root.querySelectorAll("input.score").forEach(inp => {
    inp.addEventListener("input", e => {
      const { r, m, side } = e.target.dataset;
      setScore(+r, +m, side, e.target.value);
    });
  });

  ROUNDS.forEach((round, r) => round.forEach((_, m) => updateWinnerHighlight(r, m)));
}

function updateWinnerHighlight(r, m) {
  const card = document.getElementById(`match-${r}-${m}`);
  if (!card) return;
  const sc = getScore(r, m);
  const rowA = card.querySelector('.team-row[data-side="a"]');
  const rowB = card.querySelector('.team-row[data-side="b"]');
  rowA.classList.remove("winner");
  rowB.classList.remove("winner");
  if (sc.a != null && sc.b != null && sc.a !== sc.b) {
    (sc.a > sc.b ? rowA : rowB).classList.add("winner");
  }
}

/* ---------- Tabla ---------- */
function computeStandings() {
  const rows = state.teams.map((t, i) => ({
    idx: i, name: t.name, p1: t.p1, p2: t.p2,
    pj: 0, g: 0, p: 0, e: 0, gf: 0, gc: 0, pts: 0,
  }));

  ROUNDS.forEach((round, r) => {
    round.forEach(([ta, tb], m) => {
      const sc = getScore(r, m);
      if (sc.a == null || sc.b == null) return;
      const A = rows[ta], B = rows[tb];
      A.pj++; B.pj++;
      A.gf += sc.a; A.gc += sc.b;
      B.gf += sc.b; B.gc += sc.a;
      if (sc.a > sc.b)      { A.g++; B.p++; A.pts += 2; }
      else if (sc.b > sc.a) { B.g++; A.p++; B.pts += 2; }
      else                  { A.e++; B.e++; A.pts++; B.pts++; }
    });
  });

  rows.sort((x, y) =>
    y.pts - x.pts ||
    (y.gf - y.gc) - (x.gf - x.gc) ||
    y.gf - x.gf ||
    x.name.localeCompare(y.name)
  );
  return rows;
}

function renderTabla() {
  const body = document.getElementById("tabla-body");
  const rows = computeStandings();
  const anyPlayed = rows.some(r => r.pj > 0);
  body.innerHTML = rows.map((row, i) => {
    const diff = row.gf - row.gc;
    const diffCls = diff > 0 ? "diff-pos" : diff < 0 ? "diff-neg" : "";
    const diffTxt = diff > 0 ? "+" + diff : diff;
    return `
      <tr class="${i === 0 && anyPlayed ? "top1" : ""}">
        <td class="pos">${i + 1}</td>
        <td class="equipo left">${esc(row.name)}<span class="players">${esc(row.p1)} · ${esc(row.p2)}</span></td>
        <td>${row.pj}</td>
        <td>${row.g}</td>
        <td>${row.p}</td>
        <td class="${diffCls}">${diffTxt}</td>
        <td class="pts">${row.pts}</td>
      </tr>`;
  }).join("");
}

/* ---------- Equipos ---------- */
function renderEquipos() {
  const grid = document.getElementById("equipos-grid");
  grid.innerHTML = state.teams.map((t, i) => `
    <div class="equipo-card">
      <div class="num">Equipo ${i + 1}</div>
      <label>Nombre del equipo</label>
      <input class="team-name" data-i="${i}" data-field="name" value="${esc(t.name)}" />
      <label>Jugador/a 1</label>
      <input data-i="${i}" data-field="p1" value="${esc(t.p1)}" />
      <label>Jugador/a 2</label>
      <input data-i="${i}" data-field="p2" value="${esc(t.p2)}" />
    </div>
  `).join("");

  grid.querySelectorAll("input").forEach(inp => {
    inp.addEventListener("input", e => {
      const { i, field } = e.target.dataset;
      state.teams[+i][field] = e.target.value;
      save();
      renderPartidos();
      renderTabla();
    });
  });
}

/* ---------- Tabs ---------- */
document.querySelectorAll(".tab").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach(b => b.classList.remove("active"));
    document.querySelectorAll(".view").forEach(v => v.classList.remove("active"));
    btn.classList.add("active");
    document.getElementById("view-" + btn.dataset.view).classList.add("active");
    if (btn.dataset.view === "tabla") renderTabla();
  });
});

document.getElementById("btn-reset").addEventListener("click", () => {
  if (confirm("¿Reiniciar el torneo? Se borran resultados y se restauran los equipos originales.")) {
    state = freshState();
    save();
    renderPartidos();
    renderTabla();
    renderEquipos();
  }
});

function esc(s) {
  return String(s).replace(/[&<>"']/g, c =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

renderPartidos();
renderTabla();
renderEquipos();
</script>
</body>
</html>
